<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador seguros</title>

    <link rel="stylesheet" href="./dist/css/style.css">
    <link rel="stylesheet" href="./dist/css/spinner.css">
</head>
<body>
    <header class="header header__contenedor">
        <h1 class="header__titulo">Cotiza tu seguro de auto</h1>
    </header>

    <main class="main main__contenedor">
        <form class="form">
            <div class="campo">
                <label for="marca">Marca: </label>
                <select name="marca" id="marca" required>
                    <option value="">- Seleccionar -</option>
                    <option value="americano">Americano</option>
                    <option value="asiatico">Asiatico</option>
                    <option value="europeo">Europeo</option>
                </select>
            </div>
            <div class="campo">
                <label for="year">Año</label>
                <select name="year" id="year" required>

                </select>
            </div>
            <fieldset class="fieldset">
                <legend class="fieldset__titulo">Tipo seguro</legend>
                <div class="radio-container">
                    <div class="radio-btn">
                        <label for="basico">Básico</label>
                        <input type="radio" value="basico" id="basico" name="tipo" checked>
                    </div>
                    <div class="radio-btn">
                        <label for="completo">Completo</label>
                        <input type="radio" value="completo" id="completo" name="tipo">
                    </div>
                </div>
            </fieldset>

            <div class="info">
                <div class="info__carga">
                    <div class="spinner">
                        <div class="rect1"></div>
                        <div class="rect2"></div>
                        <div class="rect3"></div>
                        <div class="rect4"></div>
                        <div class="rect5"></div>
                    </div>
                    
                </div>
                
                <table class="table">
                    <thead>
                        <tr>
                            <th>Tu resumen:</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>

            <input type="submit" value="Cotizar Seguro" class="btn-enviar">
        </form>
    </main>
    <script src="./dist/js/imagenes.js"></script>
    <script src="./dist/js/app.js"></script>
</body>
</html>
